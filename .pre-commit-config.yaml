repos:
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.6.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        types: [file]
        args: [--max-warnings=0]
        additional_dependencies:
          - eslint@10.6.0
          - typescript@5.2.2
          - '@typescript-eslint/eslint-plugin@8.62.0'
          - '@typescript-eslint/parser@8.62.0'
          - '@eslint/js@10.0.1'
          - typescript-eslint@8.62.0

  - repo: local
    hooks:
      - id: install-deps
        name: install-deps
        language: system
        entry: make install
        pass_filenames: false
        files: ^(action-io-generator|bundle-verifier)/(package\.json|package-lock\.json)$

      - id: bundle
        name: bundle
        language: system
        entry: bash -c 'make bundle && git add -v action-io-generator/dist/ bundle-verifier/dist/'
        pass_filenames: false
        files: ^(action-io-generator|bundle-verifier)/(src/|package\.json|package-lock\.json)$
